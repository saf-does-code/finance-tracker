<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #666; margin-bottom: 2rem; }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; border: 1px solid #eee; }
    .card.full { grid-column: 1 / -1; }
    input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 10px; }
    button.submit { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button.submit:hover { background: #555; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 8px; border-bottom: 2px solid #eee; color: #888; font-weight: 500; }
    td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
    button.delete { background: none; border: none; color: #cc3333; cursor: pointer; font-size: 13px; }
    button.delete:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Finance Tracker</h1>
  <p class="subtitle">Track your daily expenses</p>

  <div class="grid">
    <div class="card">
      <h2>Add expense</h2>
      <input type="number" id="amount" placeholder="Amount (AED)" step="0.01" min="0" />
      <select id="category">
        <option value="">Select category</option>
        <option>Food</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Entertainment</option>
        <option>Health</option>
        <option>Other</option>
      </select>
      <input type="date" id="date" />
      <input type="text" id="note" placeholder="Note (optional)" />
      <button class="submit" onclick="addExpense()">Add expense</button>
    </div>

    <div class="card">
      <h2>Spending by category</h2>
      <canvas id="category-chart"></canvas>
    </div>

    <div class="card full">
      <h2>All expenses</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Category</th>
            <th>Note</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expense-list"></tbody>
      </table>
    </div>
  </div>

 <script>
    const API = "http://127.0.0.1:8000";
    let categoryChart = null;

    document.getElementById("date").valueAsDate = new Date();

    async function loadExpenses() {
      const res = await fetch(`${API}/expenses`);
      const expenses = await res.json();
      const tbody = document.getElementById("expense-list");
      tbody.innerHTML = expenses.map(e => `
        <tr>
          <td>${e.date}</td>
          <td>${e.category}</td>
          <td>${e.note || "-"}</td>
          <td>${e.amount.toFixed(2)}</td>
          <td><button class="delete" onclick="deleteExpense(${e.id})">Delete</button></td>
        </tr>
      `).join("");
    }

    async function loadSummary() {
      const res = await fetch(`${API}/expenses/summary`);
      const data = await res.json();
      if (categoryChart) categoryChart.destroy();
      categoryChart = new Chart(document.getElementById("category-chart"), {
        type: "doughnut",
        data: {
          labels: data.map(d => d.category),
          datasets: [{
            data: data.map(d => d.total),
            backgroundColor: ["#e05c2a", "#2a7ae0", "#2ae05c", "#e0c42a", "#a02ae0", "#e02a6e"]
          }]
        },
        options: { plugins: { legend: { position: "bottom" } } }
      });
    }

    async function addExpense() {
      const amount = document.getElementById("amount").value;
      const category = document.getElementById("category").value;
      const date = document.getElementById("date").value;
      const note = document.getElementById("note").value;

      if (!amount || !category || !date) {
        alert("Please fill in amount, category, and date");
        return;
      }

      if (parseFloat(amount) <= 0) {
        alert("Amount must be greater than zero");
        return;
      }

      const btn = document.querySelector("button.submit");
      btn.textContent = "Adding...";
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/expense`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({amount: parseFloat(amount), category, date, note})
        });

        if (!res.ok) throw new Error("Failed to add expense");

        document.getElementById("amount").value = "";
        document.getElementById("note").value = "";
        await loadExpenses();
        await loadSummary();
      } catch (err) {
        alert("Something went wrong — please try again");
      } finally {
        btn.textContent = "Add expense";
        btn.disabled = false;
      }
    }

    async function deleteExpense(id) {
      await fetch(`${API}/expense/${id}`, { method: "DELETE" });
      loadExpenses();
      loadSummary();
    }

    loadExpenses();
    loadSummary();
  </script>
</body>
</html>
